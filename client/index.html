<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convork</title>
    <meta name="description" content="Convork is a blazing-fast video workspace. HD calls, whiteboards, file sharing and live chat. No downloads." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Fabric.js for whiteboard -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #060810;
        --surface:   #0c0f18;
        --surface2:  #111520;
        --surface3:  #181d2e;
        --border:    rgba(255,255,255,0.06);
        --border2:   rgba(255,255,255,0.12);
        --text:      #eef0f6;
        --muted:     #626880;
        --accent:    #6c63ff;
        --accent2:   #a78bfa;
        --glow:      rgba(108,99,255,0.35);
        --green:     #10d9a0;
        --red:       #ff4d6d;
        --amber:     #f5a623;
        --font-head: 'Syne', sans-serif;
        --font-body: 'DM Sans', sans-serif;
        --font-mono: 'DM Mono', monospace;
      }

      html { scroll-behavior: smooth; }
      html, body { height: 100%; }

      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root { min-height: 100vh; }

      input, button, textarea, select { font-family: var(--font-body); }
      a { color: inherit; text-decoration: none; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #2a3248; }

      /* Global animations */
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes slide-in-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(16px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes speaking-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(16,217,160,0.5); }
        50%       { box-shadow: 0 0 0 6px rgba(16,217,160,0); }
      }
      @keyframes float-reaction {
        0%   { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-90px) scale(1.1); }
      }
      @keyframes geo-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes geo-float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-16px); }
      }
      @keyframes particle-float {
        from { transform: translateY(0) scale(1); opacity: 0.3; }
        to   { transform: translateY(-20px) scale(1.2); opacity: 0.8; }
      }

      /* Noise overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
